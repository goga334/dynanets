name: track_b_mnist_phase6_preview
track: mnist
description: >-
  MNIST Phase 6 preview protocol for CNN pruning methods with minibatch GPU
  training. Compares fixed and wide CNN baselines with structured pruning,
  runtime-cost-aware pruning, sparse masking, progressive filter pruning,
  training-time reconfiguration, Network Slimming, and MorphNet.
seeds: [7, 42]
required_metrics: [accuracy]
budgets:
  dataset: mnist
  epochs: 8
  train_size: 10000
  validation_size: 5000
  test_size: 2000
experiments:
  - config: ../experiments/examples/fixed_cnn_mnist.yaml
    role: baseline
    tags: [track_b, mnist, cnn, baseline]
  - config: ../experiments/examples/wide_cnn_mnist_bn.yaml
    role: baseline
    tags: [track_b, mnist, cnn, baseline, batch_norm]
  - config: ../experiments/examples/channel_pruning_mnist.yaml
    role: method
    tags: [track_b, mnist, cnn, pruning, structured]
  - config: ../experiments/examples/runtime_neural_pruning_mnist.yaml
    role: method
    tags: [track_b, mnist, cnn, pruning, runtime]
  - config: ../experiments/examples/asfp_mnist.yaml
    role: method
    tags: [track_b, mnist, cnn, pruning, asfp]
  - config: ../experiments/examples/prunetrain_mnist.yaml
    role: method
    tags: [track_b, mnist, cnn, pruning, prunetrain]
  - config: ../experiments/examples/weights_connections_cnn_mnist.yaml
    role: method
    tags: [track_b, mnist, cnn, pruning, sparse, han]
  - config: ../experiments/examples/layerwise_obs_cnn_mnist.yaml
    role: method
    tags: [track_b, mnist, cnn, pruning, sparse, obs]
  - config: ../experiments/examples/network_slimming_mnist.yaml
    role: method
    tags: [track_b, mnist, cnn, pruning, v1_subset]
  - config: ../experiments/examples/morphnet_mnist.yaml
    role: method
    tags: [track_b, mnist, cnn, pruning, morphnet]
metadata:
  roadmap_wave: wave_2
  roadmap_phase: phase_6
  requires: [torchvision, cuda]
