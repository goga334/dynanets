name: track_c_cifar_static_preview
track: cifar10
description: >-
  CIFAR-10 static-family preview protocol for compact CNN baselines and efficient
  comparison families inspired by SqueezeNet and CondenseNet.
seeds: [7, 42]
required_metrics: [accuracy]
budgets:
  dataset: cifar10
  epochs: 8
  train_size: 10000
  validation_size: 5000
  test_size: 2000
experiments:
  - config: ../experiments/examples/fixed_cnn_cifar10.yaml
    role: baseline
    tags: [track_c, cifar10, cnn, baseline]
  - config: ../experiments/examples/squeezenet_style_cifar10.yaml
    role: reference
    tags: [track_c, cifar10, cnn, efficient, squeezenet]
  - config: ../experiments/examples/condensenet_style_cifar10.yaml
    role: reference
    tags: [track_c, cifar10, cnn, efficient, condensenet]
metadata:
  roadmap_wave: wave_4
  roadmap_phase: phase_5
  requires: [torchvision, cuda]
