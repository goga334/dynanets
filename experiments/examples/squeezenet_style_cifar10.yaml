name: squeezenet-style-cifar10

dataset:
  name: cifar10
  params:
    data_dir: data
    validation_size: 5000
    train_size: 10000
    test_size: 2000
    download: true
    seed: 42

model:
  name: squeezenet_style_cnn_classifier
  params:
    input_channels: 3
    input_size: [32, 32]
    num_classes: 10
    stem_channels: 32
    fire_channels: [48, 64, 96]
    squeeze_ratio: 0.5
    lr: 0.001

metrics:
  - name: accuracy
    params: {}

trainer:
  epochs: 8
  batch_size: 128
  eval_batch_size: 256

runtime:
  seed: 42
