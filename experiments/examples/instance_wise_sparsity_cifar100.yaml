name: instance-wise-sparsity-cifar100

dataset:
  name: cifar100
  params:
    data_dir: data
    validation_size: 5000
    train_size: 40000
    test_size: 5000
    download: true
    seed: 42

model:
  name: torch_routed_resnet_classifier
  params:
    input_channels: 3
    input_size: [32, 32]
    num_classes: 100
    stage_channels: [24, 48, 80]
    blocks_per_stage: [1, 1, 1]
    activation: relu
    lr: 0.001
    width_multipliers: [1.0, 0.875, 0.75]
    eval_width_multipliers: [0.75, 0.875, 1.0]
    routing_policy: dynamic_width
    routing_family: instance_sparse_pyramid
    gate_mode: learned
    confidence_threshold: 0.56
    min_confidence_threshold: 0.20
    gate_metric: margin
    gate_temperature: 0.16
    gate_metric_blend: 0.25
    gate_budget_weight: 0.05
    target_cost_ratio: 0.82
    min_target_cost_ratio: 0.68
    distillation_weight: 0.48
    gate_supervision_weight: 0.74
    teacher_confidence_floor: 0.32
    student_confidence_floor: 0.18
    gate_target_strategy: hybrid
    target_accept_rate: 0.50
    min_target_accept_rate: 0.34
    gate_accept_rate_weight: 0.08
    route_trace_limit: 8

metrics:
  - name: accuracy
    params: {}

workflow:
  name: instance_wise_sparsity
  params:
    warmup_epochs: 4
    consolidation_epochs: 3

trainer:
  epochs: 12
  batch_size: 128
  eval_batch_size: 256

runtime:
  seed: 42
  device: auto
