name: dynamic-nodes-dynamic-baseline
dataset:
  name: gaussian_blobs
  params:
    train_size: 512
    validation_size: 128
    test_size: 128
    input_dim: 2
    num_classes: 2
    cluster_std: 1.0
    seed: 42
model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 2
    hidden_dim: 8
    output_dim: 2
    activation: relu
    lr: 0.01
metrics:
  - name: accuracy
    params: {}
adaptation:
  name: dynamic_nodes
  params:
    target_accuracy: 0.97
    generation_width: 8
    max_layers: 2
    prune_every_n_epochs: 2
    prune_by: 1
    min_hidden_dim: 8
trainer:
  epochs: 6
runtime:
  seed: 42
