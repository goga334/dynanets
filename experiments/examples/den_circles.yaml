name: den-circles
dataset:
  name: concentric_circles
  params:
    train_size: 1024
    validation_size: 256
    test_size: 256
    radial_noise: 0.18
    seed: 42
model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 2
    hidden_dim: 8
    output_dim: 2
    activation: relu
    lr: 0.01
metrics:
  - name: accuracy
    params: {}
adaptation:
  name: den
  params:
    metric_name: accuracy
    patience: 3
    min_delta: 0.01
    grow_by: 2
    max_hidden_dim: 14
    max_expansions: 2
    cooldown_epochs: 6
trainer:
  epochs: 30
runtime:
  seed: 42
