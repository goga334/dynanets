name: nest-spirals20
dataset:
  name: two_spirals
  params:
    train_size: 3500
    validation_size: 750
    test_size: 750
    input_dim: 20
    turns: 2.0
    noise: 0.16
    feature_noise: 0.10
    seed: 42
model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 20
    hidden_dim: 12
    output_dim: 2
    activation: relu
    lr: 0.01
metrics:
  - name: accuracy
    params: {}
adaptation:
  name: nest
  params:
    grow_every_n_epochs: 8
    grow_until_epoch: 12
    grow_by: 2
    max_hidden_dim: 16
    prune_every_n_epochs: 8
    prune_start_epoch: 21
    prune_by: 1
    min_hidden_dim: 12
trainer:
  epochs: 30
runtime:
  seed: 42
