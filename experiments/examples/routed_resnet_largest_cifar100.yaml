name: routed-resnet-largest-cifar100

dataset:
  name: cifar100
  params:
    data_dir: data
    validation_size: 5000
    train_size: 40000
    test_size: 5000
    download: true
    seed: 42

model:
  name: torch_routed_resnet_classifier
  params:
    input_channels: 3
    input_size: [32, 32]
    num_classes: 100
    stage_channels: [48, 96, 128]
    blocks_per_stage: [1, 1, 1]
    activation: relu
    lr: 0.001
    width_multipliers: [1.0, 0.875, 0.75]
    eval_width_multipliers: [1.0]
    routing_policy: largest
    routing_family: slimmable_pyramid
    gate_mode: learned
    confidence_threshold: 0.7

metrics:
  - name: accuracy
    params: {}

trainer:
  epochs: 12
  batch_size: 128
  eval_batch_size: 256

runtime:
  seed: 42
  device: auto
