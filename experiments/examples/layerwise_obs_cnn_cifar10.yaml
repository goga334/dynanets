name: layerwise-obs-cnn-cifar10

dataset:
  name: cifar10
  params:
    data_dir: data
    validation_size: 5000
    train_size: 10000
    test_size: 2000
    download: true
    seed: 42

model:
  name: torch_cnn_classifier
  params:
    input_channels: 3
    input_size: [32, 32]
    num_classes: 10
    conv_channels: [24, 48, 72]
    classifier_hidden_dims: [128]
    activation: relu
    use_batch_norm: true
    lr: 0.001

metrics:
  - name: accuracy
    params: {}

adaptation:
  name: layerwise_obs
  params:
    start_epoch: 3
    prune_every_n_epochs: 1
    prune_fraction: 0.06
    max_sparsity: 0.35

trainer:
  epochs: 8
  batch_size: 128
  eval_batch_size: 256

runtime:
  seed: 42
  device: auto
