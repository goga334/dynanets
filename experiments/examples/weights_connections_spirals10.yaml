name: weights-connections-spirals10
dataset:
  name: two_spirals
  params:
    train_size: 3500
    validation_size: 750
    test_size: 750
    input_dim: 10
    turns: 2.5
    noise: 0.18
    feature_noise: 0.10
    seed: 42
model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 10
    hidden_dim: 18
    output_dim: 2
    activation: relu
    lr: 0.012
metrics:
  - name: accuracy
    params: {}
adaptation:
  name: weights_connections
  params:
    start_epoch: 8
    prune_every_n_epochs: 2
    prune_fraction: 0.08
    max_sparsity: 0.50
workflow:
  name: scheduled
  params:
    stages:
      - name: dense_warmup
        epochs: 8
        adaptation_enabled: false
      - name: prune
        epochs: 12
        adaptation_enabled: true
      - name: finetune
        epochs: 10
        adaptation_enabled: false
trainer:
  epochs: 30
runtime:
  seed: 42
