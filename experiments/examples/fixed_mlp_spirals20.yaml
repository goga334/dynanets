name: fixed-mlp-spirals20
dataset:
  name: two_spirals
  params:
    train_size: 3500
    validation_size: 750
    test_size: 750
    input_dim: 20
    turns: 2.0
    noise: 0.16
    feature_noise: 0.10
    seed: 42
model:
  name: torch_mlp_classifier
  params:
    input_dim: 20
    hidden_dim: 24
    output_dim: 2
    activation: relu
    lr: 0.01
metrics:
  - name: accuracy
    params: {}
trainer:
  epochs: 30
runtime:
  seed: 42
