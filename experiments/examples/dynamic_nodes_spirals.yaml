name: dynamic-nodes-spirals
dataset:
  name: two_spirals
  params:
    train_size: 1024
    validation_size: 256
    test_size: 256
    turns: 2.0
    noise: 0.16
    seed: 42
model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 2
    hidden_dim: 8
    output_dim: 2
    activation: relu
    lr: 0.01
metrics:
  - name: accuracy
    params: {}
adaptation:
  name: dynamic_nodes
  params:
    target_accuracy: 0.93
    generation_width: 8
    max_layers: 2
    prune_every_n_epochs: 10
    prune_by: 1
    min_hidden_dim: 8
trainer:
  epochs: 30
runtime:
  seed: 42
