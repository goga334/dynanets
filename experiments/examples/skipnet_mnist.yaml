name: skipnet-mnist

dataset:
  name: mnist
  params:
    data_dir: data
    validation_size: 5000
    train_size: 10000
    test_size: 2000
    download: true
    seed: 42

model:
  name: torch_routed_cnn_classifier
  params:
    input_channels: 1
    input_size: [28, 28]
    num_classes: 10
    conv_channels: [24, 48]
    activation: relu
    lr: 0.001
    width_multipliers: [1.0, 0.75, 0.5]
    eval_width_multipliers: [1.0]
    routing_policy: early_exit
    gate_mode: learned
    confidence_threshold: 0.58
    min_confidence_threshold: 0.30
    gate_metric: margin
    gate_temperature: 0.20
    gate_budget_weight: 0.06
    target_cost_ratio: 0.82
    distillation_weight: 0.30
    gate_supervision_weight: 0.55
    teacher_confidence_floor: 0.45
    early_exit_loss_weight: 1.00

metrics:
  - name: accuracy
    params: {}

workflow:
  name: skipnet
  params:
    warmup_epochs: 3

trainer:
  epochs: 8
  batch_size: 128
  eval_batch_size: 256

runtime:
  seed: 42
  device: auto
