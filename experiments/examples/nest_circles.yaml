name: nest-circles
dataset:
  name: concentric_circles
  params:
    train_size: 1024
    validation_size: 256
    test_size: 256
    radial_noise: 0.18
    seed: 42
model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 2
    hidden_dim: 8
    output_dim: 2
    activation: relu
    lr: 0.01
metrics:
  - name: accuracy
    params: {}
adaptation:
  name: nest
  params:
    grow_every_n_epochs: 8
    grow_until_epoch: 12
    grow_by: 2
    max_hidden_dim: 12
    prune_every_n_epochs: 8
    prune_start_epoch: 21
    prune_by: 1
    min_hidden_dim: 8
trainer:
  epochs: 30
runtime:
  seed: 42
