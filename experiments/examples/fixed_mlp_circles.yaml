name: fixed-mlp-circles
dataset:
  name: concentric_circles
  params:
    train_size: 1024
    validation_size: 256
    test_size: 256
    radial_noise: 0.18
    seed: 42
model:
  name: torch_mlp_classifier
  params:
    input_dim: 2
    hidden_dim: 16
    output_dim: 2
    activation: relu
    lr: 0.01
metrics:
  - name: accuracy
    params: {}
trainer:
  epochs: 30
runtime:
  seed: 42
