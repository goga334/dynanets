name: network-slimming-mnist

dataset:
  name: mnist
  params:
    data_dir: data
    validation_size: 5000
    train_size: 10000
    test_size: 2000
    download: true
    seed: 42

model:
  name: torch_cnn_classifier
  params:
    input_channels: 1
    input_size: [28, 28]
    num_classes: 10
    conv_channels: [24, 48]
    classifier_hidden_dims: [96]
    activation: relu
    use_batch_norm: true
    lr: 0.001

metrics:
  - name: accuracy
    params: {}

workflow:
  name: network_slimming
  params:
    sparse_epochs: 5
    finetune_epochs: 3
    sparsity_strength: 0.0002
    prune_fraction: 0.20
    min_channels_per_block: 12

trainer:
  epochs: 8
  batch_size: 128
  eval_batch_size: 256

runtime:
  seed: 42
