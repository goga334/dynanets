name: nest-staged-baseline
dataset:
  name: gaussian_blobs
  params:
    train_size: 256
    validation_size: 128
    test_size: 128
    seed: 42
model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 2
    hidden_dim: 8
    output_dim: 2
    activation: relu
    lr: 0.02
metrics:
  - name: accuracy
    params: {}
adaptation:
  name: nest
  params:
    grow_every_n_epochs: 1
    grow_until_epoch: 3
    grow_by: 2
    max_hidden_dim: 14
    prune_every_n_epochs: 1
    prune_start_epoch: 4
    prune_by: 1
    min_hidden_dim: 8
workflow:
  name: scheduled
  params:
    stages:
      - name: adapt
        epochs: 4
        adaptation_enabled: true
      - name: finetune
        epochs: 2
        adaptation_enabled: false
trainer:
  epochs: 6
runtime:
  seed: 42
