name: adanet-minimal

dataset:
  name: gaussian_blobs
  params:
    train_size: 256
    validation_size: 128
    test_size: 128
    seed: 42

model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 2
    hidden_dim: 6
    output_dim: 2
    activation: relu
    lr: 0.01

metrics:
  - name: accuracy
    params: {}

workflow:
  name: adanet_rounds
  params:
    warmup_epochs: 2
    rounds: 2
    candidate_epochs: 2
    finetune_epochs: 2
    grow_by: 2
    insert_width: 6
    max_hidden_dim: 12
    max_hidden_layers: 3
    complexity_penalty: 0.02
    include_identity_candidate: false

trainer:
  epochs: 8

runtime:
  seed: 42
