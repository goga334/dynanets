name: net2deeper-dynamic-baseline
dataset:
  name: gaussian_blobs
  params:
    train_size: 512
    validation_size: 128
    test_size: 128
    input_dim: 2
    num_classes: 2
    cluster_std: 1.0
    seed: 42
model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 2
    hidden_dim: 8
    output_dim: 2
    activation: relu
    lr: 0.01
metrics:
  - name: accuracy
    params: {}
adaptation:
  name: net2deeper
  params:
    every_n_epochs: 2
    max_layers: 3
    layer_index: 1
trainer:
  epochs: 6
runtime:
  seed: 42