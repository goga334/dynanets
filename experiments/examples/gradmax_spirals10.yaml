name: gradmax-spirals10
dataset:
  name: two_spirals
  params:
    train_size: 3500
    validation_size: 750
    test_size: 750
    input_dim: 10
    turns: 2.0
    noise: 0.16
    feature_noise: 0.10
    seed: 42
model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 10
    hidden_dim: 10
    output_dim: 2
    activation: relu
    lr: 0.01
metrics:
  - name: accuracy
    params: {}
adaptation:
  name: gradmax
  params:
    every_n_epochs: 8
    grow_by: 2
    max_hidden_dim: 14
    grad_norm_threshold: 0.01
    min_epochs_between_growth: 8
trainer:
  epochs: 30
runtime:
  seed: 42
