name: channel-gating-cifar100

dataset:
  name: cifar100
  params:
    data_dir: data
    validation_size: 5000
    train_size: 40000
    test_size: 5000
    download: true
    seed: 42

model:
  name: torch_routed_resnet_classifier
  params:
    input_channels: 3
    input_size: [32, 32]
    num_classes: 100
    stage_channels: [32, 64, 96]
    blocks_per_stage: [1, 1, 1]
    activation: relu
    lr: 0.001
    width_multipliers: [1.0, 0.875, 0.75]
    eval_width_multipliers: [0.75, 0.875, 1.0]
    routing_policy: dynamic_width
    routing_family: channel_gate_pyramid
    gate_mode: learned
    confidence_threshold: 0.58
    min_confidence_threshold: 0.22
    gate_metric: margin
    gate_temperature: 0.16
    gate_metric_blend: 0.22
    gate_budget_weight: 0.04
    target_cost_ratio: 0.86
    min_target_cost_ratio: 0.76
    distillation_weight: 0.50
    gate_supervision_weight: 0.72
    teacher_confidence_floor: 0.34
    student_confidence_floor: 0.20
    gate_target_strategy: hybrid
    target_accept_rate: 0.46
    min_target_accept_rate: 0.30
    gate_accept_rate_weight: 0.07
    route_trace_limit: 8

metrics:
  - name: accuracy
    params: {}

workflow:
  name: channel_gating
  params:
    warmup_epochs: 5

trainer:
  epochs: 12
  batch_size: 128
  eval_batch_size: 256

runtime:
  seed: 42
  device: auto
