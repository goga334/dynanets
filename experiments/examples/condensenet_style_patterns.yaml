name: condensenet-style-patterns

dataset:
  name: synthetic_image_patterns
  params:
    train_size: 2048
    validation_size: 512
    test_size: 512
    image_size: 28
    num_classes: 10
    seed: 42

model:
  name: condensenet_style_cnn_classifier
  params:
    input_channels: 1
    input_size: [28, 28]
    num_classes: 10
    stem_channels: 24
    grouped_channels: [32, 48, 64]
    groups: [2, 4, 4]
    lr: 0.001

metrics:
  - name: accuracy
    params: {}

trainer:
  epochs: 8
  batch_size: 128
  eval_batch_size: 256

runtime:
  seed: 42
