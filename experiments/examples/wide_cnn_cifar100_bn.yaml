name: wide-cnn-cifar100-bn

dataset:
  name: cifar100
  params:
    data_dir: data
    validation_size: 5000
    train_size: 40000
    test_size: 5000
    download: true
    seed: 42

model:
  name: torch_cnn_classifier
  params:
    input_channels: 3
    input_size: [32, 32]
    num_classes: 100
    conv_channels: [32, 64, 96]
    classifier_hidden_dims: [160]
    activation: relu
    use_batch_norm: true
    lr: 0.001

metrics:
  - name: accuracy
    params: {}

trainer:
  epochs: 12
  batch_size: 128
  eval_batch_size: 256

runtime:
  seed: 42
  device: auto
