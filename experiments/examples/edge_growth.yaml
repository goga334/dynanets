name: edge-growth-dynamic-baseline
dataset:
  name: gaussian_blobs
  params:
    train_size: 512
    validation_size: 128
    test_size: 128
    input_dim: 2
    num_classes: 2
    cluster_std: 1.0
    seed: 42
model:
  name: dynamic_mlp_classifier
  params:
    input_dim: 2
    hidden_dim: 8
    output_dim: 2
    activation: relu
    lr: 0.01
metrics:
  - name: accuracy
    params: {}
adaptation:
  name: edge_growth
  params:
    accuracy_floor: 0.97
    grow_by: 2
    max_hidden_dim: 10
    max_layers: 2
    low_accuracy_patience: 2
    layer_width: 8
trainer:
  epochs: 6
runtime:
  seed: 42
